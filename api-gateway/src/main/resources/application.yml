spring:
  application:
    name: api-gateway
  config:
    # This solves the 'No spring.config.import property' error
    import: "optional:config-server:http://localhost:8888"

eureka:
  instance:
    # Tells Eureka to use IP (e.g. 192.168.x.x) instead of the long hostname
    prefer-ip-address: true
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/