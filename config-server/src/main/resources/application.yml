server:
  port: 8888
eureka:
  instance:
    # Tells Eureka to use IP (e.g. 192.168.x.x) instead of the long hostname
    prefer-ip-address: true
spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      enabled: false       # IMPORTANT: Disables the client check for the server itself
      server:
        native:
          search-locations: "file:///D:/config-repo"
          search-paths: 'auth-service,discovery-server,api-gateway,order-service'

