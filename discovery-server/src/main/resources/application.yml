server:
  port: 8761

eureka:
  instance:
    # Tells Eureka to use IP (e.g. 192.168.x.x) instead of the long hostname
    prefer-ip-address: true
  client:
    register-with-eureka: false # Prevents server from registering itself
    fetch-registry: false

spring:
  cloud:
    config:
      enabled: false